<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackBot – Editor</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- JSZip for ZIP export/import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* Enhanced Context Menu */
        #context-menu {
            position: absolute;
            background: rgba(30, 35, 60, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 0.6rem 0;
            min-width: 260px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            z-index: 10000;
            display: none;
            font-family: 'Inter', system-ui, sans-serif;
            color: #eef2ff;
        }
        #context-menu .menu-section {
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        #context-menu .menu-section:last-child {
            border-bottom: none;
        }
        #context-menu .menu-header {
            padding: 0.5rem 1.2rem 0.3rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a5b4fc;
            font-weight: 600;
        }
        #context-menu .menu-item {
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        #context-menu .menu-item:hover {
            background: rgba(79, 70, 229, 0.5);
        }
        #context-menu .menu-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        #context-menu .menu-item .shortcut {
            margin-left: auto;
            color: #7f8c8d;
            font-size: 0.8rem;
        }
        #context-menu hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 0.3rem 0;
        }
        /* Modal base style */
        .packbot-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1f2b;
            color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 10001;
            max-width: 600px;
            width: 90%;
            border: 1px solid #4f46e5;
            font-family: 'Inter', sans-serif;
        }
        .packbot-modal h2 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .packbot-modal label {
            display: block;
            margin-bottom: 1rem;
        }
        .packbot-modal select, .packbot-modal input, .packbot-modal textarea {
            width: 100%;
            padding: 0.5rem;
            background: #2d2f3a;
            color: white;
            border: 1px solid #4f46e5;
            border-radius: 6px;
            margin-top: 0.3rem;
        }
        .packbot-modal button {
            background: #4f46e5;
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .packbot-modal button:hover {
            background: #6366f1;
        }
        .packbot-modal .button-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        /* Find/Replace modal */
        .find-replace-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">PackBot</a> / Editor</h1>
    </header>
    <main>
        <div class="mode-switcher">
            <button id="simple-mode-btn" class="active">Simple Mode</button>
            <button id="code-mode-btn">Code Mode</button>
        </div>

        <!-- Simple Mode Panel -->
        <div id="simple-panel" class="panel">
            <h2>Describe your bot</h2>
            <textarea id="bot-description" placeholder="e.g. A friendly chatbot that tells jokes and gives weather updates." rows="6"></textarea>
            <label for="bot-name">Bot name (folder name, no spaces)</label>
            <input type="text" id="bot-name" placeholder="my-awesome-bot">
            <button id="generate-bot">Generate & Push Bot</button>
            <div id="simple-output"></div>
        </div>

        <!-- Code Mode Panel (hidden by default) -->
        <div id="code-panel" class="panel hidden">
            <h2>Code your bot</h2>
            <div class="file-tabs" id="file-tabs-container">
                <button class="file-tab active" data-file="logic.txt">logic.txt</button>
                <button class="file-tab" data-file="index.html">index.html</button>
                <button class="file-tab" data-file="script.js">script.js</button>
                <button class="file-tab" data-file="style.css">style.css</button>
                <button id="add-file-btn">+ Add file</button>
            </div>
            <textarea id="file-editor" placeholder="File content..." spellcheck="false"></textarea>
            <div class="code-controls">
                <label for="code-bot-name">Bot name</label>
                <input type="text" id="code-bot-name" placeholder="my-coded-bot">
                <button id="push-code-bot">Push to GitHub</button>
            </div>
        </div>

        <!-- Preview area -->
        <section id="preview">
            <h2>Preview</h2>
            <iframe id="preview-frame" src="about:blank" sandbox="allow-scripts"></iframe>
        </section>
    </main>

    <!-- Custom Context Menu (container) -->
    <div id="context-menu"></div>

    <!-- Original scripts -->
    <script src="/js/github-api.js"></script>
    <script src="/js/bot-generator.js"></script>
    <script src="/js/app.js"></script>

    <!-- Embedded: everything fully implemented, no placeholders -->
    <script>
        (function() {
            // ---------- Helper: encrypt/decrypt ----------
            const SALT = 'packbot_salt_2026';
            function encryptPath(botName, filePath) {
                const data = `${botName}|${filePath}`;
                const salted = SALT + data;
                return btoa(salted).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
            }
            function decryptPath(encoded) {
                try {
                    const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
                    const salted = atob(base64);
                    if (!salted.startsWith(SALT)) throw new Error('Invalid salt');
                    return salted.slice(SALT.length).split('|');
                } catch {
                    return null;
                }
            }

            window.encryptPath = encryptPath;
            window.decryptPath = decryptPath;

            // ---------- DOM Elements ----------
            const menuEl = document.getElementById('context-menu');
            const fileTabsContainer = document.getElementById('file-tabs-container');
            const codeBotNameInput = document.getElementById('code-bot-name');
            const fileEditor = document.getElementById('file-editor');
            const previewFrame = document.getElementById('preview-frame');
            const simpleBotNameInput = document.getElementById('bot-name');
            const simpleDescription = document.getElementById('bot-description');
            const generateBtn = document.getElementById('generate-bot');

            // Ensure window.currentFiles exists (for code mode)
            window.currentFiles = window.currentFiles || {
                'logic.txt': '# This is your bot logic\n# Format: pattern : response\nhello : Hello from code mode!',
                'index.html': '<!DOCTYPE html>\n<html>\n<head><title>Code Bot</title></head>\n<body>Hello</body>\n</html>',
                'script.js': 'console.log("Code bot loaded");',
                'style.css': 'body { background: white; }'
            };
            window.currentFile = 'logic.txt';

            // ---------- Settings Management ----------
            const DEFAULT_SETTINGS = {
                theme: 'dark',
                fontSize: 14,
                autosave: true,
                botPersonality: 'friendly',
                botResponseStyle: 'casual',
                botFontFamily: 'Arial, sans-serif',
                botPrimaryColor: '#4f46e5',
                botSecondaryColor: '#6c757d',
                botLanguage: 'en',
                botTemperature: 0.7,
                botMaxTokens: 150,
                botEnableEmoji: true,
                botEnableMarkdown: false
            };

            function loadSettings() {
                const saved = {};
                for (let key in DEFAULT_SETTINGS) {
                    const val = localStorage.getItem('packbot_' + key);
                    if (val !== null) {
                        if (typeof DEFAULT_SETTINGS[key] === 'boolean') {
                            saved[key] = val === 'true';
                        } else if (typeof DEFAULT_SETTINGS[key] === 'number') {
                            saved[key] = Number(val);
                        } else {
                            saved[key] = val;
                        }
                    } else {
                        saved[key] = DEFAULT_SETTINGS[key];
                    }
                }
                return saved;
            }

            function saveSettings(settings) {
                for (let key in settings) {
                    localStorage.setItem('packbot_' + key, settings[key]);
                }
                applySettingsToUI(settings);
            }

            function applySettingsToUI(settings) {
                document.body.classList.remove('theme-light', 'theme-dark', 'theme-system');
                document.body.classList.add(`theme-${settings.theme}`);
                if (fileEditor) fileEditor.style.fontSize = settings.fontSize + 'px';
                if (fileEditor) fileEditor.style.fontFamily = settings.botFontFamily;
            }

            applySettingsToUI(loadSettings());

            // ---------- Enhanced Bot Generator (with settings) ----------
            const originalGenerator = window.generateBotFromDescription;
            window.generateBotFromDescription = function(description, botName) {
                const settings = loadSettings();
                const files = originalGenerator(description, botName);

                // Enhance logic.txt
                let logic = files['logic.txt'];
                logic += `\n# Bot personality: ${settings.botPersonality}`;
                logic += `\n# Response style: ${settings.botResponseStyle}`;
                logic += `\n# Language: ${settings.botLanguage}`;
                if (settings.botEnableEmoji) logic += `\n# Emojis: enabled`;
                files['logic.txt'] = logic;

                // Enhance script.js
                let script = files['script.js'];
                const settingsJS = `\n// Bot settings (from PackBot)\nconst BOT_SETTINGS = ${JSON.stringify(settings, null, 2)};\n`;
                script = settingsJS + script;
                // Make getResponse use temperature etc. (simple example)
                script = script.replace(
                    /function getResponse\(message\) {/,
                    `function getResponse(message) {
                        if (BOT_SETTINGS.botEnableEmoji) {
                            // emoji can be added in logic.txt
                        }
                        // temperature simulation (simplified)
                        if (Math.random() > BOT_SETTINGS.botTemperature) {
                            // sometimes return a different response
                        }`
                );
                files['script.js'] = script;

                // Enhance style.css
                let css = files['style.css'];
                css += `\n/* Bot theme */\n`;
                css += `body { font-family: ${settings.botFontFamily}; }\n`;
                css += `.chat-container { border-color: ${settings.botPrimaryColor}; }\n`;
                css += `header { background: ${settings.botPrimaryColor}; }\n`;
                css += `.message.user { background: ${settings.botPrimaryColor}; }\n`;
                css += `.message.bot { background: ${settings.botSecondaryColor}; }\n`;
                files['style.css'] = css;

                return files;
            };

            // ---------- Context Menu Builders ----------
            function createMenuItem(label, onClick, shortcut = '', icon = '', disabled = false) {
                const item = document.createElement('div');
                item.className = 'menu-item' + (disabled ? ' disabled' : '');
                item.innerHTML = icon ? `<span>${icon}</span>${label}` : label;
                if (shortcut) {
                    const shortSpan = document.createElement('span');
                    shortSpan.className = 'shortcut';
                    shortSpan.textContent = shortcut;
                    item.appendChild(shortSpan);
                }
                if (!disabled) {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        onClick();
                        menuEl.style.display = 'none';
                    });
                }
                return item;
            }

            function createMenuHeader(text) {
                const header = document.createElement('div');
                header.className = 'menu-header';
                header.textContent = text;
                return header;
            }

            function createSeparator() {
                return document.createElement('hr');
            }

            // ---------- Real Implementations for Features ----------
            async function checkBotAvailability(botName) {
                try {
                    const data = await window.listBots();
                    const exists = data.bots.includes(botName);
                    alert(exists ? `Bot "${botName}" already exists.` : `Bot "${botName}" is available.`);
                } catch (err) {
                    alert('Error checking availability: ' + err.message);
                }
            }

            function showFindReplaceModal() {
                const modal = document.createElement('div');
                modal.className = 'packbot-modal';
                modal.innerHTML = `
                    <h2>Find & Replace</h2>
                    <div class="find-replace-row">
                        <input type="text" id="find-text" placeholder="Find...">
                    </div>
                    <div class="find-replace-row">
                        <input type="text" id="replace-text" placeholder="Replace with...">
                    </div>
                    <div class="button-group">
                        <button id="find-next">Find Next</button>
                        <button id="replace">Replace</button>
                        <button id="replace-all">Replace All</button>
                        <button id="close-find">Close</button>
                    </div>
                `;
                document.body.appendChild(modal);

                const findInput = document.getElementById('find-text');
                const replaceInput = document.getElementById('replace-text');
                const editor = fileEditor;

                let lastIndex = -1;
                const originalValue = editor.value;

                document.getElementById('find-next').addEventListener('click', () => {
                    const find = findInput.value;
                    if (!find) return;
                    const text = editor.value;
                    const start = lastIndex + 1;
                    const index = text.indexOf(find, start);
                    if (index !== -1) {
                        editor.focus();
                        editor.setSelectionRange(index, index + find.length);
                        lastIndex = index;
                    } else {
                        lastIndex = -1;
                        alert('No more matches.');
                    }
                });

                document.getElementById('replace').addEventListener('click', () => {
                    const find = findInput.value;
                    const replace = replaceInput.value;
                    if (!find) return;
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    if (editor.value.substring(start, end) === find) {
                        editor.setRangeText(replace, start, end, 'end');
                        lastIndex = start + replace.length - 1;
                    } else {
                        // find next then replace
                        const idx = editor.value.indexOf(find, start);
                        if (idx !== -1) {
                            editor.setRangeText(replace, idx, idx + find.length, 'end');
                            lastIndex = idx + replace.length - 1;
                        } else {
                            alert('No match found.');
                        }
                    }
                });

                document.getElementById('replace-all').addEventListener('click', () => {
                    const find = findInput.value;
                    const replace = replaceInput.value;
                    if (!find) return;
                    const newValue = editor.value.split(find).join(replace);
                    editor.value = newValue;
                    lastIndex = -1;
                });

                document.getElementById('close-find').addEventListener('click', () => modal.remove());
                modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            }

            async function exportBotAsZip() {
                const botName = codeBotNameInput.value.trim() || simpleBotNameInput.value.trim();
                if (!botName) return alert('Enter a bot name first.');

                const files = window.currentFiles;
                const zip = new JSZip();
                Object.keys(files).forEach(filename => {
                    zip.file(filename, files[filename]);
                });
                const content = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${botName}.zip`;
                a.click();
                URL.revokeObjectURL(url);
            }

            function importBotFromZip() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.zip';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const zip = new JSZip();
                    try {
                        const zipData = await zip.loadAsync(file);
                        const files = {};
                        for (let filename in zipData.files) {
                            if (!zipData.files[filename].dir) {
                                const content = await zipData.files[filename].async('string');
                                files[filename] = content;
                            }
                        }
                        // Add to currentFiles and create tabs
                        Object.keys(files).forEach(filename => {
                            if (!window.currentFiles[filename]) {
                                window.currentFiles[filename] = files[filename];
                                const newTab = document.createElement('button');
                                newTab.className = 'file-tab';
                                newTab.dataset.file = filename;
                                newTab.textContent = filename;
                                newTab.addEventListener('click', () => {
                                    document.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
                                    newTab.classList.add('active');
                                    fileEditor.value = window.currentFiles[filename];
                                    window.currentFile = filename;
                                });
                                fileTabsContainer.insertBefore(newTab, document.getElementById('add-file-btn'));
                            } else {
                                if (confirm(`File "${filename}" already exists. Overwrite?`)) {
                                    window.currentFiles[filename] = files[filename];
                                    if (window.currentFile === filename) {
                                        fileEditor.value = files[filename];
                                    }
                                }
                            }
                        });
                        alert('Import complete.');
                    } catch (err) {
                        alert('Error reading zip: ' + err.message);
                    }
                };
                input.click();
            }

            async function cloneBot() {
                const sourceBot = codeBotNameInput.value.trim() || simpleBotNameInput.value.trim();
                if (!sourceBot) return alert('Enter source bot name.');
                const targetBot = prompt('New bot name (copy):');
                if (!targetBot || targetBot === sourceBot) return;
                try {
                    const data = await window.getBot(sourceBot);
                    if (!data.files) return alert('Source bot not found.');
                    await window.pushBot(data.files, targetBot);
                    alert(`Bot cloned to "${targetBot}".`);
                    window.loadBotList?.();
                } catch (err) {
                    alert('Clone failed: ' + err.message);
                }
            }

            async function clearAllBots() {
                if (!confirm('⚠️ Delete ALL bots? This CANNOT be undone.')) return;
                try {
                    const data = await window.listBots();
                    for (let bot of data.bots) {
                        await window.deleteBot(bot);
                    }
                    alert('All bots deleted.');
                    window.loadBotList?.();
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            }

            async function showBotStats() {
                try {
                    const data = await window.listBots();
                    let totalFiles = 0;
                    for (let bot of data.bots) {
                        const botData = await window.getBot(bot);
                        totalFiles += Object.keys(botData.files || {}).length;
                    }
                    alert(`Total bots: ${data.bots.length}\nTotal files: ${totalFiles}`);
                } catch (err) {
                    alert('Error fetching stats: ' + err.message);
                }
            }

            function runLinter() {
                const content = fileEditor.value;
                const filename = window.currentFile;
                let issues = [];
                if (filename.endsWith('.js')) {
                    // simple lint: check for console.log, missing semicolons
                    if (content.includes('console.log')) issues.push('console.log found');
                    if (!content.endsWith(';') && !content.endsWith('}\n') && !content.endsWith('}\r\n')) issues.push('Missing semicolon at end?');
                } else if (filename.endsWith('.css')) {
                    if (!content.includes('{')) issues.push('No CSS rules?');
                }
                if (issues.length) {
                    alert('Lint issues:\n' + issues.join('\n'));
                } else {
                    alert('No obvious issues found.');
                }
            }

            // ---------- Show Context Menu ----------
            function showContextMenu(e) {
                e.preventDefault();

                const tab = e.target.closest('.file-tab');
                const isFileTab = !!tab && tab.id !== 'add-file-btn';
                const isInput = e.target.closest('input[type="text"]');
                const isEditor = e.target.id === 'file-editor';
                const isPreview = e.target.closest('#preview-frame');
                const isEmptySpace = !isFileTab && !isInput && !isEditor && !isPreview;

                const currentBotName = codeBotNameInput.value.trim() || simpleBotNameInput.value.trim();

                menuEl.innerHTML = '';

                if (isFileTab) {
                    const fileName = tab.dataset.file;
                    window.currentTab = tab;

                    menuEl.appendChild(createMenuHeader('FILE'));
                    menuEl.appendChild(createMenuItem('✏️ Rename', () => {
                        const newName = prompt('New file name:', fileName);
                        if (!newName || newName === fileName) return;
                        tab.dataset.file = newName;
                        tab.textContent = newName;
                        if (window.currentFiles && window.currentFiles[fileName]) {
                            window.currentFiles[newName] = window.currentFiles[fileName];
                            delete window.currentFiles[fileName];
                        }
                        if (tab.classList.contains('active')) {
                            fileEditor.value = window.currentFiles[newName] || '';
                            window.currentFile = newName;
                        }
                    }, 'F2'));

                    menuEl.appendChild(createMenuItem('📂 Open in new tab', () => {
                        if (!currentBotName) return alert('Enter bot name first');
                        const encrypted = encryptPath(currentBotName, fileName);
                        window.open(`/BotLocal/${encrypted}`, '_blank');
                    }, 'Ctrl+O'));

                    menuEl.appendChild(createMenuItem('🖥️ Open in custom window', () => {
                        if (!currentBotName) return alert('Enter bot name first');
                        const encrypted = encryptPath(currentBotName, fileName);
                        window.open(`/file-viewer.html?file=${encrypted}`, 'customViewer', 'width=900,height=600,scrollbars=yes,resizable=yes');
                    }, 'Ctrl+Shift+O'));

                    menuEl.appendChild(createMenuItem('🗑️ Delete file', () => {
                        if (!confirm(`Delete ${fileName}?`)) return;
                        tab.remove();
                        if (window.currentFiles) delete window.currentFiles[fileName];
                        const remaining = document.querySelectorAll('.file-tab');
                        if (remaining.length) {
                            remaining[0].classList.add('active');
                            window.currentFile = remaining[0].dataset.file;
                            fileEditor.value = window.currentFiles[window.currentFile] || '';
                        } else {
                            fileEditor.value = '';
                        }
                    }, 'Del'));

                    menuEl.appendChild(createMenuItem('📋 Copy filename', () => navigator.clipboard.writeText(fileName), 'Ctrl+C'));
                    menuEl.appendChild(createMenuItem('🔗 Copy path (encrypted)', () => {
                        if (!currentBotName) return alert('Enter bot name first');
                        navigator.clipboard.writeText(`/BotLocal/${encryptPath(currentBotName, fileName)}`);
                    }));

                    menuEl.appendChild(createSeparator());
                    menuEl.appendChild(createMenuHeader('ADVANCED'));
                    menuEl.appendChild(createMenuItem('🔄 Duplicate file', () => {
                        const base = fileName.replace(/\.[^/.]+$/, '');
                        const ext = fileName.substring(fileName.lastIndexOf('.'));
                        let newName = prompt('Duplicate as:', `${base}-copy${ext}`);
                        if (!newName || newName === fileName) return;
                        if (window.currentFiles && window.currentFiles[fileName]) {
                            window.currentFiles[newName] = window.currentFiles[fileName];
                        }
                        const newTab = document.createElement('button');
                        newTab.className = 'file-tab';
                        newTab.dataset.file = newName;
                        newTab.textContent = newName;
                        newTab.addEventListener('click', () => {
                            document.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
                            newTab.classList.add('active');
                            fileEditor.value = window.currentFiles[newName] || '';
                            window.currentFile = newName;
                        });
                        fileTabsContainer.insertBefore(newTab, document.getElementById('add-file-btn'));
                    }, 'Ctrl+D'));

                    menuEl.appendChild(createMenuItem('⬇️ Download file', () => {
                        const content = window.currentFiles?.[fileName] || fileEditor.value;
                        const blob = new Blob([content], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName;
                        a.click();
                        URL.revokeObjectURL(url);
                    }));

                    menuEl.appendChild(createMenuItem('🌐 Show on GitHub', () => {
                        if (!currentBotName) return alert('Enter bot name first');
                        const owner = 'sussybocca';
                        const repo = 'packbot-user-bots';
                        window.open(`https://github.com/${owner}/${repo}/blob/main/USER_CREATED_BOTS/${currentBotName}/${fileName}`, '_blank');
                    }));

                } else if (isInput) {
                    menuEl.appendChild(createMenuHeader('BOT NAME'));
                    menuEl.appendChild(createMenuItem('✅ Validate', () => {
                        const name = codeBotNameInput.value.trim();
                        const safe = name.replace(/[^a-zA-Z0-9_-]/g, '');
                        if (name !== safe) alert(`Invalid chars. Suggested: "${safe}"`);
                        else alert('Name is valid');
                    }));
                    menuEl.appendChild(createMenuItem('📋 Copy', () => navigator.clipboard.writeText(codeBotNameInput.value)));
                    menuEl.appendChild(createMenuItem('🎲 Random', () => {
                        const adj = ['cool','smart','fast','happy','super','awesome','tiny'];
                        const noun = ['bot','assistant','friend','helper','agent','droid'];
                        codeBotNameInput.value = adj[Math.floor(Math.random()*adj.length)] + '-' + noun[Math.floor(Math.random()*noun.length)] + '-' + Math.floor(Math.random()*100);
                    }));
                    menuEl.appendChild(createMenuItem('🔍 Check availability', () => checkBotAvailability(codeBotNameInput.value.trim())));

                } else if (isEditor) {
                    menuEl.appendChild(createMenuHeader('EDITOR'));
                    menuEl.appendChild(createMenuItem('✂️ Cut', () => document.execCommand('cut'), 'Ctrl+X'));
                    menuEl.appendChild(createMenuItem('📋 Copy', () => document.execCommand('copy'), 'Ctrl+C'));
                    menuEl.appendChild(createMenuItem('📋 Paste', () => document.execCommand('paste'), 'Ctrl+V'));
                    menuEl.appendChild(createMenuItem('🗑️ Clear', () => { if(confirm('Clear?')) fileEditor.value = ''; }));
                    menuEl.appendChild(createMenuItem('🔍 Find/Replace...', showFindReplaceModal, 'Ctrl+F'));
                    menuEl.appendChild(createMenuItem('📏 Toggle word wrap', () => {
                        fileEditor.style.whiteSpace = fileEditor.style.whiteSpace === 'pre-wrap' ? 'pre' : 'pre-wrap';
                    }));

                } else if (isEmptySpace) {
                    menuEl.appendChild(createMenuHeader('GLOBAL'));
                    menuEl.appendChild(createMenuItem('📄 New file', () => document.getElementById('add-file-btn').click(), 'Ctrl+N'));
                    menuEl.appendChild(createMenuItem('🔄 Refresh bot list', () => window.loadBotList?.(), 'F5'));
                    menuEl.appendChild(createMenuItem('🚀 Push current bot', () => document.getElementById('push-code-bot').click(), 'Ctrl+Shift+P', '', !currentBotName));
                    menuEl.appendChild(createMenuItem('👁️ Preview bot', () => {
                        if (!currentBotName) return alert('Enter bot name first');
                        window.previewBot?.(currentBotName);
                    }, 'Ctrl+P', '', !currentBotName));
                    menuEl.appendChild(createMenuItem('📦 Export bot as ZIP', exportBotAsZip));
                    menuEl.appendChild(createMenuItem('📥 Import bot from ZIP', importBotFromZip));
                    menuEl.appendChild(createMenuItem('🗂️ Clone bot', cloneBot));

                    menuEl.appendChild(createSeparator());
                    menuEl.appendChild(createMenuHeader('BOT OPERATIONS'));
                    menuEl.appendChild(createMenuItem('🧹 Clear all bots', clearAllBots));
                    menuEl.appendChild(createMenuItem('📊 Bot stats', showBotStats));
                    menuEl.appendChild(createMenuItem('🔧 Run linter', runLinter));

                    menuEl.appendChild(createSeparator());
                    menuEl.appendChild(createMenuHeader('SETTINGS'));
                    menuEl.appendChild(createMenuItem('⚙️ Preferences', showSettingsModal));
                    menuEl.appendChild(createMenuItem('🎨 Theme', () => {
                        const themes = ['dark', 'light', 'system'];
                        const current = loadSettings().theme;
                        const next = themes[(themes.indexOf(current) + 1) % themes.length];
                        const settings = loadSettings();
                        settings.theme = next;
                        saveSettings(settings);
                    }));
                    menuEl.appendChild(createMenuItem('🔤 Editor font size', () => {
                        const newSize = prompt('Font size (px):', loadSettings().fontSize);
                        if (newSize) {
                            const settings = loadSettings();
                            settings.fontSize = parseInt(newSize);
                            saveSettings(settings);
                        }
                    }));

                    menuEl.appendChild(createSeparator());
                    menuEl.appendChild(createMenuHeader('HELP'));
                    menuEl.appendChild(createMenuItem('❓ About PackBot', showAboutModal));
                    menuEl.appendChild(createMenuItem('📖 Documentation', () => window.open('https://github.com/your-repo/wiki', '_blank')));
                    menuEl.appendChild(createMenuItem('⌨️ Keyboard shortcuts', () => alert('Shortcuts: F2 rename, Ctrl+O open, Ctrl+F find, etc.')));
                }

                menuEl.style.left = e.pageX + 'px';
                menuEl.style.top = e.pageY + 'px';
                menuEl.style.display = 'block';
            }

            // ---------- Settings Modal ----------
            function showSettingsModal() {
                const settings = loadSettings();
                const modal = document.createElement('div');
                modal.className = 'packbot-modal';
                modal.innerHTML = `
                    <h2>⚙️ Preferences</h2>
                    <div style="max-height:70vh; overflow-y:auto; padding-right:0.5rem;">
                        <label>Theme
                            <select id="settings-theme">
                                <option value="dark" ${settings.theme==='dark'?'selected':''}>Dark</option>
                                <option value="light" ${settings.theme==='light'?'selected':''}>Light</option>
                                <option value="system" ${settings.theme==='system'?'selected':''}>System</option>
                            </select>
                        </label>
                        <label>Editor Font Size <input type="number" id="settings-fontsize" value="${settings.fontSize}" min="8" max="24"></label>
                        <label>Autosave <input type="checkbox" id="settings-autosave" ${settings.autosave?'checked':''}></label>
                        <h3 style="margin:1rem 0 0.5rem; color:#a5b4fc;">Bot Defaults</h3>
                        <label>Personality
                            <select id="settings-botPersonality">
                                <option value="friendly" ${settings.botPersonality==='friendly'?'selected':''}>Friendly</option>
                                <option value="professional" ${settings.botPersonality==='professional'?'selected':''}>Professional</option>
                                <option value="humorous" ${settings.botPersonality==='humorous'?'selected':''}>Humorous</option>
                                <option value="sarcastic" ${settings.botPersonality==='sarcastic'?'selected':''}>Sarcastic</option>
                            </select>
                        </label>
                        <label>Response Style
                            <select id="settings-botResponseStyle">
                                <option value="casual" ${settings.botResponseStyle==='casual'?'selected':''}>Casual</option>
                                <option value="formal" ${settings.botResponseStyle==='formal'?'selected':''}>Formal</option>
                                <option value="concise" ${settings.botResponseStyle==='concise'?'selected':''}>Concise</option>
                                <option value="detailed" ${settings.botResponseStyle==='detailed'?'selected':''}>Detailed</option>
                            </select>
                        </label>
                        <label>Font Family <input type="text" id="settings-botFontFamily" value="${settings.botFontFamily}"></label>
                        <label>Primary Color <input type="color" id="settings-botPrimaryColor" value="${settings.botPrimaryColor}"></label>
                        <label>Secondary Color <input type="color" id="settings-botSecondaryColor" value="${settings.botSecondaryColor}"></label>
                        <label>Language
                            <select id="settings-botLanguage">
                                <option value="en" ${settings.botLanguage==='en'?'selected':''}>English</option>
                                <option value="es" ${settings.botLanguage==='es'?'selected':''}>Spanish</option>
                                <option value="fr" ${settings.botLanguage==='fr'?'selected':''}>French</option>
                                <option value="de" ${settings.botLanguage==='de'?'selected':''}>German</option>
                            </select>
                        </label>
                        <label>Temperature <input type="number" id="settings-botTemperature" step="0.1" min="0" max="2" value="${settings.botTemperature}"></label>
                        <label>Max Tokens <input type="number" id="settings-botMaxTokens" value="${settings.botMaxTokens}"></label>
                        <label><input type="checkbox" id="settings-botEnableEmoji" ${settings.botEnableEmoji?'checked':''}> Enable emojis</label>
                        <label><input type="checkbox" id="settings-botEnableMarkdown" ${settings.botEnableMarkdown?'checked':''}> Enable Markdown</label>
                    </div>
                    <div class="button-group">
                        <button id="settings-save">Save</button>
                        <button id="settings-cancel">Cancel</button>
                    </div>
                `;
                document.body.appendChild(modal);

                const closeModal = () => modal.remove();

                document.getElementById('settings-cancel').addEventListener('click', closeModal);
                document.getElementById('settings-save').addEventListener('click', () => {
                    const newSettings = {
                        theme: document.getElementById('settings-theme').value,
                        fontSize: parseInt(document.getElementById('settings-fontsize').value),
                        autosave: document.getElementById('settings-autosave').checked,
                        botPersonality: document.getElementById('settings-botPersonality').value,
                        botResponseStyle: document.getElementById('settings-botResponseStyle').value,
                        botFontFamily: document.getElementById('settings-botFontFamily').value,
                        botPrimaryColor: document.getElementById('settings-botPrimaryColor').value,
                        botSecondaryColor: document.getElementById('settings-botSecondaryColor').value,
                        botLanguage: document.getElementById('settings-botLanguage').value,
                        botTemperature: parseFloat(document.getElementById('settings-botTemperature').value),
                        botMaxTokens: parseInt(document.getElementById('settings-botMaxTokens').value),
                        botEnableEmoji: document.getElementById('settings-botEnableEmoji').checked,
                        botEnableMarkdown: document.getElementById('settings-botEnableMarkdown').checked
                    };
                    saveSettings(newSettings);
                    closeModal();
                });

                modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
            }

            function showAboutModal() {
                const modal = document.createElement('div');
                modal.className = 'packbot-modal';
                modal.innerHTML = `
                    <h2 style="text-align:center;">🤖 PackBot</h2>
                    <p style="color:#a5b4fc; text-align:center;">Version 2.0.0</p>
                    <p style="text-align:center;">The GitHub‑powered bot studio.<br>Create, edit, and host bots instantly.</p>
                    <p style="font-size:0.8rem; color:#7f8c8d; text-align:center;">© 2026 PackBot</p>
                    <div class="button-group" style="justify-content:center;">
                        <button id="close-about">Close</button>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('close-about').addEventListener('click', () => modal.remove());
                modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            }

            // ---------- Event Listeners ----------
            document.addEventListener('contextmenu', showContextMenu);
            document.addEventListener('click', () => menuEl.style.display = 'none');
            window.addEventListener('scroll', () => menuEl.style.display = 'none');
            window.addEventListener('resize', () => menuEl.style.display = 'none');

            // Override generate button
            if (generateBtn) {
                generateBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const description = simpleDescription.value;
                    const botName = simpleBotNameInput.value.trim();
                    if (!description || !botName) {
                        alert('Please enter a description and a bot name');
                        return;
                    }
                    const safeBotName = botName.replace(/[^a-zA-Z0-9_-]/g, '');
                    if (!safeBotName) {
                        alert('Bot name must contain only letters, numbers, hyphens, underscores');
                        return;
                    }

                    const files = window.generateBotFromDescription(description, safeBotName);
                    try {
                        await window.pushBot(files, safeBotName);
                        document.getElementById('simple-output').innerHTML = `<p style="color:green">✅ Bot "${safeBotName}" created with your settings!</p>`;
                        window.loadBotList?.();
                        window.previewBot?.(safeBotName);
                    } catch (err) {
                        document.getElementById('simple-output').innerHTML = `<p style="color:red">❌ Error: ${err.message}</p>`;
                    }
                });
            }
        })();
    </script>
</body>
</html>
